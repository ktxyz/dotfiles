# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:Tc"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 10000
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

setw -g mode-keys vi

# ---------------------------------------------------------------------------
# Keybinds
# ---------------------------------------------------------------------------

# Splits — v for vertical (side by side), s for horizontal (stacked)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window

# Quick reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Copy mode — vi bindings
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Fuzzy pickers and quick session switch
bind f run-shell '~/.config/tmux/plugins/tmux-fzf/scripts/window.sh'
bind S choose-tree -Zw

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'folke/tokyonight.nvim'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_fg 'colour0'
set -g @prefix_highlight_bg 'colour6'

set -g @tokyonight_flavor 'night'

# Bootstrap TPM on first run
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
