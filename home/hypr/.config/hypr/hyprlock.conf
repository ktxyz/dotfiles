general {
    grace = 3
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    brightness = 0.7
    contrast = 0.9
    vibrancy = 0.2
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H)"
    color = rgba(c0caf5ff)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%M)"
    color = rgba(7aa2f7ff)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%a %d %b')"
    color = rgba(a9b1d6ff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -340
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(7aa2f7ff)
    inner_color = rgba(1a1b26ff)
    font_color = rgba(c0caf5ff)
    fade_on_empty = true
    placeholder_text = <i>enter password...</i>
    position = 0, -420
    halign = center
    valign = center
}
