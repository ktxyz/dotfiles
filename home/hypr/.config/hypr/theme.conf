# Tokyo Night color palette
$bg         = rgb(1a1b26)
$bg_dark    = rgb(16161e)
$bg_hl      = rgb(292e42)
$fg         = rgb(c0caf5)
$fg_dark    = rgb(a9b1d6)
$comment    = rgb(565f89)
$red        = rgb(f7768e)
$orange     = rgb(ff9e64)
$yellow     = rgb(e0af68)
$green      = rgb(9ece6a)
$cyan       = rgb(7dcfff)
$blue       = rgb(7aa2f7)
$purple     = rgb(bb9af7)

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $blue $purple 45deg
    col.inactive_border = $bg_hl
    layout = dwindle
}

# ---------------------------------------------------------------------------
# Decoration
# ---------------------------------------------------------------------------
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 2
        ignore_opacity = true
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    active_opacity = 1.0
    inactive_opacity = 0.95
}

# Layer blur for waybar
layerrule = blur, waybar
layerrule = ignorezero, waybar

# ---------------------------------------------------------------------------
# Animations
# ---------------------------------------------------------------------------
animations {
    enabled = true

    bezier = smooth, 0.05, 0.9, 0.1, 1.0
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 7, smooth, slide
    animation = windowsOut, 1, 7, smoothOut, slide
    animation = windowsMove, 1, 5, smooth
    animation = fade, 1, 5, smooth
    animation = workspaces, 1, 5, smooth, slidefade 20%
    animation = border, 1, 10, smooth
    animation = borderangle, 0
}

# ---------------------------------------------------------------------------
# Layout
# ---------------------------------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
}
